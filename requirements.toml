[rules]
prefix_rules = [
  { pattern = [{ token = "echo" }, { token = "codex-requirements-test" }], decision = "forbidden", justification = "テスト用: requirements.toml が有効です。" },
  { pattern = [{ token = "sudo" }], decision = "forbidden", justification = "権限昇格コマンドを禁止します。" },
  { pattern = [{ token = "curl" }], decision = "forbidden", justification = "外部からの直接ダウンロードを禁止します。" },
  { pattern = [{ token = "wget" }], decision = "forbidden", justification = "外部からの直接ダウンロードを禁止します。" },
  { pattern = [{ token = "ssh" }], decision = "forbidden", justification = "外部ホストへの SSH 接続を禁止します。" },
  { pattern = [{ token = "scp" }], decision = "forbidden", justification = "外部ホストとの SCP 転送を禁止します。" },
  { pattern = [{ token = "rm" }, { token = "-rf" }], decision = "forbidden", justification = "破壊的な再帰削除を禁止します。" },
  { pattern = [{ token = "rm" }, { token = "-fr" }], decision = "forbidden", justification = "破壊的な再帰削除を禁止します。" },
  { pattern = [{ token = "rm" }, { token = "-r" }], decision = "forbidden", justification = "再帰削除を禁止します。" },
  { pattern = [{ token = "rm" }, { token = "-R" }], decision = "forbidden", justification = "再帰削除を禁止します。" },
  { pattern = [{ token = "rm" }, { token = "-r" }, { token = "-f" }], decision = "forbidden", justification = "破壊的な再帰削除を禁止します。" },
  { pattern = [{ token = "rm" }, { token = "-f" }, { token = "-r" }], decision = "forbidden", justification = "破壊的な再帰削除を禁止します。" },
  { pattern = [{ token = "chmod" }, { token = "777" }], decision = "forbidden", justification = "過剰に広い権限変更を禁止します。" },
  { pattern = [{ token = "chmod" }, { token = "-R" }, { token = "777" }], decision = "forbidden", justification = "過剰に広い権限変更を禁止します。" },
  { pattern = [{ token = "git" }, { token = "reset" }, { token = "--hard" }], decision = "forbidden", justification = "未保存変更を破棄する履歴操作を禁止します。" },
  { pattern = [{ token = "git" }, { token = "checkout" }, { token = "--" }], decision = "forbidden", justification = "作業ツリーの変更破棄を禁止します。" },
  { pattern = [{ token = "git" }, { token = "push" }, { token = "--force" }], decision = "forbidden", justification = "履歴破壊を伴う強制 push を禁止します。" },
  { pattern = [{ token = "git" }, { token = "push" }, { token = "-f" }], decision = "forbidden", justification = "履歴破壊を伴う強制 push を禁止します。" },
  { pattern = [{ token = "git" }, { token = "clean" }, { token = "-fd" }], decision = "forbidden", justification = "未追跡ファイルの強制削除を禁止します。" },
  { pattern = [{ token = "git" }, { token = "clean" }, { token = "-df" }], decision = "forbidden", justification = "未追跡ファイルの強制削除を禁止します。" },
  { pattern = [{ token = "git" }, { token = "clean" }, { token = "-fdx" }], decision = "forbidden", justification = "未追跡ファイルと ignore 対象の強制削除を禁止します。" },
  { pattern = [{ token = "git" }, { token = "clean" }, { token = "-f" }, { token = "-d" }], decision = "forbidden", justification = "未追跡ファイルの強制削除を禁止します。" },
  { pattern = [{ token = "git" }, { token = "clean" }, { token = "-d" }, { token = "-f" }], decision = "forbidden", justification = "未追跡ファイルの強制削除を禁止します。" },
  { pattern = [{ token = "git" }, { token = "clean" }, { token = "-f" }, { token = "-d" }, { token = "-x" }], decision = "forbidden", justification = "未追跡ファイルと ignore 対象の強制削除を禁止します。" },
]
